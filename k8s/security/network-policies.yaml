        - podSelector:
            matchLabels:
              app: frontend
        - podSelector:
            matchLabels:
              app: checkoutservice
      ports:
        - port: 7070
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis-cart
      ports:
        - port: 6379
