# NetworkPolicy: default deny all ingress/egress in webapps namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: webapps
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS egress for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: webapps
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# frontend: allow ingress from LoadBalancer/internet on 8080, egress to all services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-netpol
  namespace: webapps
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: productcatalogservice
      ports:
        - port: 3550
    - to:
        - podSelector:
            matchLabels:
              app: currencyservice
      ports:
        - port: 7000
    - to:
        - podSelector:
            matchLabels:
              app: cartservice
      ports:
        - port: 7070
    - to:
        - podSelector:
            matchLabels:
              app: recommendationservice
      ports:
        - port: 8080
    - to:
        - podSelector:
            matchLabels:
              app: shippingservice
      ports:
        - port: 50051
    - to:
        - podSelector:
            matchLabels:
              app: checkoutservice
      ports:
        - port: 5050
    - to:
        - podSelector:
            matchLabels:
              app: adservice
      ports:
        - port: 9555
---
# checkoutservice
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: checkoutservice-netpol
  namespace: webapps
spec:
  podSelector:
    matchLabels:
      app: checkoutservice
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 5050
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: productcatalogservice
      ports:
        - port: 3550
    - to:
        - podSelector:
            matchLabels:
              app: shippingservice
      ports:
        - port: 50051
    - to:
        - podSelector:
            matchLabels:
              app: paymentservice
      ports:
        - port: 50051
    - to:
        - podSelector:
            matchLabels:
              app: emailservice
      ports:
        - port: 5000
    - to:
        - podSelector:
            matchLabels:
              app: currencyservice
      ports:
        - port: 7000
    - to:
        - podSelector:
            matchLabels:
              app: cartservice
      ports:
        - port: 7070
---
# cartservice
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cartservice-netpol
  namespace: webapps
spec:
  podSelector:
    matchLabels:
      app: cartservice
  policyTypes:
    - Ingress
    - Egress
  ingress:
