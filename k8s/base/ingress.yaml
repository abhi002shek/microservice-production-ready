# Ingress — HTTP only (no domain purchased yet)
# After deploying, get the ALB DNS with: kubectl get ingress -n webapps
# The ALB DNS will look like: k8s-webapps-xxx.ap-south-1.elb.amazonaws.com
#
# When you buy a domain later:
#   1. Create ACM certificate for your domain
#   2. Add: alb.ingress.kubernetes.io/certificate-arn: <arn>
#   3. Add: alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
#   4. Add: alb.ingress.kubernetes.io/ssl-redirect: "443"
#   5. Add spec.rules[0].host: yourdomain.com
#   6. Point your domain's A record to the ALB DNS via Route53
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: webapps
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /_healthz
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
